name: Run Path Tracer Jenkins

on:
  push:
    branches: [ptCLI]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build workflow run id to use as the EX40 package source"
        required: true
      scene_set:
        description: "Path tracer scene set to run in Jenkins"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - public
          - private
      publish:
        description: "Publish the generated report to store.devsh.eu"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: write
  statuses: write

jobs:
  cancel-superseded:
    name: Cancel superseded Path Tracer Jenkins runs
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '/ci skip') && !contains(github.event.head_commit.message, 'no CI') && !contains(github.event.head_commit.message, 'no ci')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout scripts
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/scripts

      - name: Cancel older Actions runs
        if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, '/ci keep') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/cancel_older_runs.py \
            --github-token "$GH_TOKEN" \
            --repository "${{ github.repository }}" \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --run-id "${{ github.run_id }}"

      - name: Cancel older Jenkins runs
        if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, '/ci keep') }}
        env:
          JENKINS_URL: https://jenkins.devsh.eu
          JENKINS_USER: ${{ secrets.JENKINS_DITT_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_DITT_TOKEN }}
        run: |
          python3 .github/scripts/path_tracer_jenkins.py cancel-jenkins \
            --jenkins-url "$JENKINS_URL" \
            --jenkins-user "$JENKINS_USER" \
            --jenkins-token "$JENKINS_TOKEN" \
            --repository "${{ github.repository }}" \
            --branch "${{ github.ref_name }}"

  trigger-jenkins:
    name: Trigger Path Tracer Jenkins
    needs: cancel-superseded
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '/ci skip') && !contains(github.event.head_commit.message, 'no CI') && !contains(github.event.head_commit.message, 'no ci')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/scripts

      - name: Resolve source build
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/path_tracer_jenkins.py resolve \
            --github-token "$GH_TOKEN" \
            --repository "${{ github.repository }}" \
            --event-name "${{ github.event_name }}" \
            --branch "${{ github.ref_name }}" \
            --sha "${{ github.sha }}" \
            --run-id "${{ inputs.run_id }}" \
            --scene-set "${{ inputs.scene_set || 'both' }}" \
            --publish "${{ inputs.publish }}"

      - name: Download install artifact
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.source.outputs.run_id }}
          pattern: run-windows-*-msvc-${{ steps.source.outputs.build_config }}-install
          path: artifact
          merge-multiple: true
          github-token: ${{ secrets.READ_PAT || github.token }}
          repository: Devsh-Graphics-Programming/Nabla

      - name: Prepare EX40 runtime package
        id: package
        run: |
          python3 .github/scripts/path_tracer_jenkins.py package \
            --artifact-dir artifact \
            --package-root ex40-runtime-package \
            --zip-path ex40-runtime-package.zip

      - name: Trigger Jenkins
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JENKINS_URL: https://jenkins.devsh.eu
          JENKINS_USER: ${{ secrets.JENKINS_DITT_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_DITT_TOKEN }}
        run: |
          python3 .github/scripts/path_tracer_jenkins.py trigger \
            --jenkins-url "$JENKINS_URL" \
            --jenkins-user "$JENKINS_USER" \
            --jenkins-token "$JENKINS_TOKEN" \
            --github-token "$GITHUB_TOKEN" \
            --package-path "${{ steps.package.outputs.zip_path }}" \
            --repository "${{ github.repository }}" \
            --branch "${{ steps.source.outputs.branch }}" \
            --sha "${{ steps.source.outputs.sha }}" \
            --source-run-id "${{ steps.source.outputs.run_id }}" \
            --source-run-attempt "${{ steps.source.outputs.run_attempt }}" \
            --source-workflow "${{ steps.source.outputs.workflow }}" \
            --scene-set "${{ steps.source.outputs.scene_set }}" \
            --publish "${{ steps.source.outputs.publish }}" \
            --preempt "${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '/ci keep') }}"
